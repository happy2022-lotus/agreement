<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>아이톡톡·아이북 이용 동의서 작성</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f4f4f4; }
        #agreement-form { background: white; width: 800px; margin: 0 auto; padding: 40px; border: 1px solid #ccc; }
        h2 { text-align: center; font-size: 20px; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 14px; }
        th, td { border: 1px solid #000; padding: 10px; text-align: center; }
        .input-section { margin-top: 20px; display: flex; gap: 10px; justify-content: center; align-items: center; }
        #signature-pad { border: 1px solid #000; background-color: #efefef; cursor: crosshair; }
        .btn-area { text-align: center; margin-top: 30px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        .clear-btn { background: #6c757d; }
    </style>
</head>
<body>

<div id="agreement-form">
    <h2>'빅데이터·AI플랫폼 아이톡톡', '아이북' 사용을 위한<br>개인정보 수집·이용 동의서(학생)</h2>
    
    <p style="font-size: 13px;">경상남도교육청에서는 학생 맞춤형 교육 환경 제공을 위해 아래와 같이 개인정보를 수집 및 이용하고자 합니다.</p>

    <table>
        <tr>
            <th>항목</th>
            <th>수집·이용 목적</th>
            <th>보유·이용기간</th>
        </tr>
        <tr>
            <td>아이톡톡 계정 ID, 학교, 학년, 반, 이름, 생년월일, 교육활동 정보</td>
            <td>교수·학습 시스템 운영, 과제 제출, 학적정보관리 등</td>
            <td>졸업 및 타시도 전출 시까지</td>
        </tr>
    </table>

    <div style="text-align: right; margin-bottom: 20px;">
        <label><input type="checkbox" id="agree-check"> 개인정보 수집·이용에 동의합니다.</label>
    </div>

    <div class="input-section">
        2026년 <input type="number" id="grade" style="width:40px"> 학년 
        <input type="number" id="class" style="width:40px"> 반 
        성명: <input type="text" id="name" style="width:100px">
    </div>

    <div style="margin-top:20px; text-align:center;">
        <p>서명란 (마우스나 펜으로 서명하세요)</p>
        <canvas id="signature-pad" width="400" height="150"></canvas>
        <br>
        <button class="clear-btn" onclick="clearSignature()">서명 지우기</button>
    </div>

    <div style="margin-top:40px; text-align:center; font-weight:bold;">
        가회중학교 학교장 귀하
    </div>
</div>

<div class="btn-area">
    <button onclick="savePDF()">PDF로 저장하기</button>
</div>

<script>
    // 서명 패드 설정
    const canvas = document.getElementById('signature-pad');
    const signaturePad = new SignaturePad(canvas);

    function clearSignature() {
        signaturePad.clear();
    }

    // PDF 생성 함수
    function savePDF() {
        const isAgreed = document.getElementById('agree-check').checked;
        const name = document.getElementById('name').value;

        if (!isAgreed) {
            alert("개인정보 수집·이용에 동의하셔야 합니다.");
            return;
        }
        if (!name) {
            alert("이름을 입력해주세요.");
            return;
        }
        if (signaturePad.isEmpty()) {
            alert("서명을 해주세요.");
            return;
        }

        const element = document.getElementById('agreement-form');
        const opt = {
            margin: 10,
            filename: `동의서_${name}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
