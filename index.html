<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>아이톡톡 동의서 작성</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { background-color: #525659; display: flex; flex-direction: column; align-items: center; padding: 20px; font-family: 'Malgun Gothic', sans-serif; }
        
        /* [중요] 이미지 파일 이름이 'form.jpg'여야 합니다. PNG라면 form.png로 수정하세요 */
        #pdf-page { 
            width: 800px; height: 350px; 
            background: url('form.jpg') no-repeat center center; 
            background-size: 100% 100%;
            position: relative; 
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .input-overlay { position: absolute; border: none; background: rgba(0,0,0,0.05); font-size: 13pt; outline: none; }
        .input-overlay:focus { background: rgba(255, 255, 0, 0.2); }

        /* 위치 세부 조정 (보내주신 이미지 폼 기준) */
        #year   { top: 182px; left: 432px; width: 45px; text-align: center; }
        #month  { top: 182px; left: 512px; width: 35px; text-align: center; }
        #day    { top: 182px; left: 582px; width: 35px; text-align: center; }

        #grade  { top: 252px; left: 35px; width: 40px; text-align: center; }
        #class  { top: 252px; left: 140px; width: 40px; text-align: center; }
        #name   { top: 252px; left: 290px; width: 120px; text-align: left; }
        
        #parent { top: 297px; left: 175px; width: 120px; text-align: left; }

        .signature-wrapper { position: absolute; top: 230px; left: 680px; }
        #signature-pad { border: 1px dashed #ccc; background-color: transparent; }

        .controls { margin-bottom: 20px; display: flex; gap: 10px; }
        button { padding: 10px 20px; font-size: 12pt; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        .clear-btn { background: #6c757d; }
    </style>
</head>
<body>

<div class="controls">
    <button onclick="savePDF()">PDF 저장하기</button>
    <button class="clear-btn" onclick="clearSignature()">서명 지우기</button>
</div>

<div id="pdf-page">
    <input type="number" id="year" class="input-overlay" value="26">
    <input type="number" id="month" class="input-overlay">
    <input type="number" id="day" class="input-overlay">

    <input type="number" id="grade" class="input-overlay">
    <input type="number" id="class" class="input-overlay">
    <input type="text" id="name" class="input-overlay">

    <input type="text" id="parent" class="input-overlay">

    <div class="signature-wrapper">
        <canvas id="signature-pad" width="120" height="60"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('signature-pad');
    const signaturePad = new SignaturePad(canvas, { minWidth: 1, maxWidth: 2, penColor: "black" });

    function clearSignature() { signaturePad.clear(); }

    function savePDF() {
        const name = document.getElementById('name').value || '동의서';
        const element = document.getElementById('pdf-page');
        const opt = {
            margin: 0,
            filename: `${name}_동의서.pdf`,
            html2canvas: { scale: 3, useCORS: true },
            jsPDF: { unit: 'px', format: [800, 350], orientation: 'landscape' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
