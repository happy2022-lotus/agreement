<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>아이톡톡 동의서 작성</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { background-color: #525659; display: flex; flex-direction: column; align-items: center; padding: 20px; font-family: 'Malgun Gothic', sans-serif; }
        
        /* 이미지 크기에 맞춰 영역 설정 */
        #pdf-page { 
            width: 800px; height: 350px; 
            background: url('form_image.png') no-repeat center center; 
            background-size: contain;
            position: relative; 
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .input-overlay { position: absolute; border: none; background: transparent; font-size: 14pt; outline: none; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

        /* 위치 세부 조정 */
        #year   { top: 185px; left: 435px; width: 45px; text-align: center; }
        #month  { top: 185px; left: 515px; width: 35px; text-align: center; }
        #day    { top: 185px; left: 585px; width: 35px; text-align: center; }

        #grade  { top: 255px; left: 35px; width: 40px; text-align: center; }
        #class  { top: 255px; left: 140px; width: 40px; text-align: center; }
        #name   { top: 255px; left: 290px; width: 120px; text-align: left; }
        
        #parent { top: 300px; left: 175px; width: 120px; text-align: left; }

        /* 서명 패드 위치 */
        .signature-wrapper { position: absolute; top: 235px; left: 700px; }
        #signature-pad { border: 1px dashed #ccc; background-color: rgba(255, 255, 255, 0.3); }

        .controls { margin-bottom: 20px; }
        button { padding: 10px 20px; font-size: 12pt; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        .clear-btn { background: #6c757d; margin-left: 10px; }
    </style>
</head>
<body>

<div class="controls">
    <button onclick="savePDF()">PDF 저장하기</button>
    <button class="clear-btn" onclick="clearSignature()">서명 지우기</button>
</div>

<div id="pdf-page">
    <input type="number" id="year" class="input-overlay" placeholder="26">
    <input type="number" id="month" class="input-overlay">
    <input type="number" id="day" class="input-overlay">

    <input type="number" id="grade" class="input-overlay">
    <input type="number" id="class" class="input-overlay">
    <input type="text" id="name" class="input-overlay">

    <input type="text" id="parent" class="input-overlay">

    <div class="signature-wrapper">
        <canvas id="signature-pad" width="150" height="60"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('signature-pad');
    const signaturePad = new SignaturePad(canvas, {
        minWidth: 1,
        maxWidth: 2,
        penColor: "black"
    });

    function clearSignature() {
        signaturePad.clear();
    }

    function savePDF() {
        const name = document.getElementById('name').value || '동의서';
        const element = document.getElementById('pdf-page');
        
        const opt = {
            margin: 0,
            filename: `${name}_동의서.pdf`,
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { scale: 3 },
            jsPDF: { unit: 'px', format: [800, 350], orientation: 'landscape' }
        };

        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
