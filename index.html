<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>아이톡톡 동의서 작성 프로그램</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { background-color: #525659; display: flex; flex-direction: column; align-items: center; padding: 20px; font-family: 'Malgun Gothic', sans-serif; }
        
        /* 문서 영역: 배경 이미지를 깔아 원본과 똑같이 보이게 함 */
        #pdf-page { 
            width: 210mm; height: 297mm; 
            background: url('background.jpg') no-repeat center center; 
            background-size: contain;
            position: relative; 
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* 입력창 위치 조정 (원본 파일의 빈칸 위치에 맞게 세밀하게 조정 가능) */
        .input-overlay { position: absolute; font-size: 14pt; font-weight: bold; }
        
        #check-agree { top: 715px; left: 345px; transform: scale(1.5); cursor: pointer; } /* '동의' 체크박스 위치 */
        
        #input-grade { top: 765px; left: 245px; width: 35px; border: none; background: transparent; text-align: center; font-size: 13pt; }
        #input-class { top: 765px; left: 325px; width: 35px; border: none; background: transparent; text-align: center; font-size: 13pt; }
        #input-name  { top: 765px; left: 455px; width: 100px; border: none; background: transparent; text-align: left; font-size: 13pt; }
        
        /* 서명 패드 위치 */
        .signature-wrapper { position: absolute; top: 790px; left: 395px; }
        #signature-pad { border: 1px dashed #ccc; background-color: rgba(255, 255, 255, 0.5); }

        .controls { margin-bottom: 20px; position: sticky; top: 0; z-index: 100; }
        button { padding: 10px 20px; font-size: 12pt; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        .clear-btn { background: #6c757d; margin-left: 10px; }
    </style>
</head>
<body>

<div class="controls">
    <button onclick="savePDF()">작성 완료 및 PDF 저장</button>
    <button class="clear-btn" onclick="clearSignature()">서명 지우기</button>
</div>

<div id="pdf-page">
    <input type="checkbox" id="check-agree" class="input-overlay">

    <input type="number" id="input-grade" class="input-overlay">
    <input type="number" id="input-class" class="input-overlay">
    <input type="text" id="input-name" class="input-overlay">

    <div class="signature-wrapper">
        <canvas id="signature-pad" width="220" height="80"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('signature-pad');
    const signaturePad = new SignaturePad(canvas);

    function clearSignature() {
        signaturePad.clear();
    }

    function savePDF() {
        if (!document.getElementById('check-agree').checked) {
            alert("동의란에 체크해주세요."); return;
        }
        const name = document.getElementById('input-name').value;
        if (!name) { alert("이름을 입력해주세요."); return; }

        const element = document.getElementById('pdf-page');
        const opt = {
            margin: 0,
            filename: `아이톡톡_동의서_${name}.pdf`,
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { scale: 3 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
